services:
  app:
    build:
      context: .
      target: dev
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    env_file:
      - .env
    command: ['bun', 'run', 'dev', '--', '--host', '0.0.0.0']
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./static
          target: /app/static
        - action: rebuild
          path: package.json

  preview:
    build:
      context: .
      target: preview
      args:
        PUBLIC_ADAPTER: 'static'
        PUBLIC_YNAB_CLIENT_ID: ''
    ports:
      - '4173:4173'

  e2e:
    build:
      context: .
      target: e2e
    environment:
      BASE_URL: 'http://preview:4173'
    depends_on:
      preview:
        condition: service_started

  # Optional: Netlify-style local dev (run with: docker compose up netlify)
  netlify:
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - '8888:8888'
    volumes:
      - .:/app
    env_file:
      - .env
    command: >
      sh -c "npm install -g netlify-cli && netlify dev"
    profiles:
      - netlify

volumes:
  app_node_modules:
