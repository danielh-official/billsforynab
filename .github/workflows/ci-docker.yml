name: CI (Docker)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PUBLIC_ADAPTER: static
  PUBLIC_YNAB_CLIENT_ID: ''

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          load: true
          tags: builder:latest
          build-args: |
            PUBLIC_ADAPTER=${{ env.PUBLIC_ADAPTER }}
            PUBLIC_YNAB_CLIENT_ID=${{ env.PUBLIC_YNAB_CLIENT_ID }}

      - name: Run lint
        run: docker run --rm builder:latest bun run lint

      - name: Run check
        run: docker run --rm builder:latest bun run check

      - name: Run unit tests
        run: docker run --rm builder:latest bun run test:unit -- --run

      - name: Extract build artifact
        run: |
          docker create --name buildout builder:latest
          docker cp buildout:/app/build ./build
          docker rm buildout

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/